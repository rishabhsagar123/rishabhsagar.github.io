<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --bg-dark: #030712;
            --bg-card: #1e1b4b;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f172a 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(10px);
            background: rgba(3, 7, 18, 0.8);
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            z-index: 1000;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            transition: color 0.3s;
            position: relative;
        }

        nav a:hover {
            color: var(--accent-light);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10rem 2rem 4rem;
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-decorative {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
        }

        /* ===== CONTROLS ===== */
        .controls {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        input[type="text"], textarea, input[type="email"] {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--text);
            padding: 0.8rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus, textarea:focus, input[type="email"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .input-group {
            flex: 1;
            min-width: 250px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-light);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ===== BLOG POSTS ===== */
        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 3rem;
            color: var(--text);
            position: relative;
            padding-bottom: 1rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 2px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .post-card {
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.6), rgba(30, 41, 59, 0.4));
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideUp 0.6s ease-out both;
            display: flex;
            flex-direction: column;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card:nth-child(1) { animation-delay: 0.1s; }
        .post-card:nth-child(2) { animation-delay: 0.2s; }
        .post-card:nth-child(3) { animation-delay: 0.3s; }
        .post-card:nth-child(4) { animation-delay: 0.4s; }

        .post-card:hover {
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15);
            transform: translateY(-8px);
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.8), rgba(30, 41, 59, 0.6));
        }

        .post-header {
            padding: 1.5rem;
            background: rgba(59, 130, 246, 0.05);
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
            transition: color 0.3s;
        }

        .post-card:hover .post-title {
            color: var(--accent-light);
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .post-content {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .post-excerpt {
            color: var(--text-dim);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .read-time {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-card), var(--secondary));
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav a {
                margin-left: 0;
            }

            .hero {
                padding: 6rem 1.5rem 3rem;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .input-group {
                min-width: 100%;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-light);
        }
    </style>
</head>
<body>
    <div class="hero-decorative"></div>

    <!-- HEADER -->
    <header>
        <div class="header-content">
            <a href="#" class="logo">✨ MyBlog</a>
            <nav>
                <a href="#home">Home</a>
                <a href="#posts">Posts</a>
                <a href="#" onclick="openAddModal(); return false;">New Post</a>
            </nav>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" id="home">
        <h1>Share your Thoughts!</h1>
        <p>Share your thoughts, ideas, and stories with the world. Write, inspire, and connect.</p>
    </section>

    <!-- CONTROLS SECTION -->
    <div class="controls">
        <div class="input-group">
            <label>Search Posts</label>
            <input type="text" id="searchInput" placeholder="Search by title or content...">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add New Post</button>
    </div>

    <!-- BLOG POSTS SECTION -->
    <section class="blog-container">
        <h2 class="section-title" id="posts">Latest Posts</h2>
        <div class="posts-grid" id="postsGrid">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <p>No posts yet. Create your first post to get started!</p>
            </div>
        </div>
    </section>

    <!-- ADD/EDIT POST MODAL -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Post</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="postForm" onsubmit="savePost(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="postTitle" required placeholder="Enter post title...">
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="postAuthor" required placeholder="Your name...">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="postContent" required placeholder="Write your post content..."></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="postCategory" placeholder="e.g., Technology, Travel, Food...">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Publish Post</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize posts from localStorage
        let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
        let editingIndex = -1;

        // Render initial posts
        renderPosts(posts);

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = posts.filter(post => 
                post.title.toLowerCase().includes(searchTerm) || 
                post.content.toLowerCase().includes(searchTerm) ||
                post.author.toLowerCase().includes(searchTerm)
            );
            renderPosts(filtered);
        });

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('postForm').reset();
            document.querySelector('.modal-header h2').textContent = 'Add New Post';
            document.getElementById('postModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
            document.getElementById('postForm').reset();
        }

        function savePost(e) {
            e.preventDefault();

            const post = {
                id: editingIndex === -1 ? Date.now() : posts[editingIndex].id,
                title: document.getElementById('postTitle').value,
                author: document.getElementById('postAuthor').value,
                content: document.getElementById('postContent').value,
                category: document.getElementById('postCategory').value || 'Uncategorized',
                date: editingIndex === -1 ? new Date().toLocaleDateString() : posts[editingIndex].date,
                readTime: Math.ceil(document.getElementById('postContent').value.split(' ').length / 200)
            };

            if (editingIndex === -1) {
                posts.unshift(post);
            } else {
                posts[editingIndex] = post;
            }

            localStorage.setItem('blogPosts', JSON.stringify(posts));
            renderPosts(posts);
            closeModal();
        }

        function deletePost(index) {
            if (confirm('Are you sure you want to delete this post?')) {
                posts.splice(index, 1);
                localStorage.setItem('blogPosts', JSON.stringify(posts));
                renderPosts(posts);
            }
        }

        function editPost(index) {
            editingIndex = index;
            const post = posts[index];
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postAuthor').value = post.author;
            document.getElementById('postContent').value = post.content;
            document.getElementById('postCategory').value = post.category;
            document.querySelector('.modal-header h2').textContent = 'Edit Post';
            document.getElementById('postModal').classList.add('active');
        }

        function renderPosts(postsToRender) {
            const grid = document.getElementById('postsGrid');

            if (postsToRender.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No posts found. Create your first post to get started!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = postsToRender.map((post, index) => `
                <div class="post-card">
                    <div class="post-header">
                        <h3 class="post-title">${escapeHtml(post.title)}</h3>
                        <div class="post-meta">
                            <span>👤 ${escapeHtml(post.author)}</span>
                            <span>📅 ${post.date}</span>
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="post-excerpt">${escapeHtml(post.content.substring(0, 150))}...</div>
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                            <span style="background: rgba(59, 130, 246, 0.1); color: var(--accent-light); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem;">
                                ${escapeHtml(post.category)}
                            </span>
                        </div>
                    </div>
                    <div class="post-footer">
                        <span class="read-time">⏱️ ${post.readTime} min read</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-secondary" onclick="editPost(${posts.indexOf(post)})" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Edit</button>
                            <button class="btn btn-danger" onclick="deletePost(${posts.indexOf(post)})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('postModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
